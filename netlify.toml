[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/bh-ohi-platform"
  to = "/login"
  status = 301

[[redirects]]
  from = "/bh-ohi-platform/*"
  to = "/login"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
